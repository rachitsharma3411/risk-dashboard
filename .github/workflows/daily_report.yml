name: Daily Derivatives Risk Report

on:
  schedule:
    - cron: '30 21 * * 1-5'   # Mon-Fri 21:30 UTC = 4:30 PM ET
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate risk data & dashboard JSON
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python export_data.py

      - name: Commit and push updated data.json
        run: |
          cd ..
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json src/snapshots.db || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update risk dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
