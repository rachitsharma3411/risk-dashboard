name: Daily Derivatives Risk Report

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate risk data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python export_data.py
      - name: Commit updated data
        run: |
          cd ..
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json src/snapshots.db || true
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: update risk dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
